name: Mirror to GitLab

on:
  push:
    branches: [ "main" ]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate secrets
        run: |
          test -n "${{ secrets.GITLAB_TOKEN }}" || { echo "GITLAB_TOKEN is empty"; exit 1; }

      - name: Push to GitLab
        run: |
          git remote remove gitlab 2>/dev/null || true
          git remote add gitlab "https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/racpast/SNIBypassGUI.git"
          git push --force gitlab HEAD:main
